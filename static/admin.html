<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin - Quick Count</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; text-align: center; background: #f9f9f9; }
        .card { background: white; padding: 20px; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        button { padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #a71d2a; }
        .chart-container { position: relative; height:40vh; width:80vw; max-width: 600px; margin: auto; }
    </style>
</head>
<body>
    <h1> Dashboard Monitoring</h1>
    
    <div class="card">
        <h3>Hasil Perolehan Suara Real-Time</h3>
        <div class="chart-container">
            <canvas id="voteChart"></canvas>
        </div>
    </div>

    <div class="card" style="border-top: 5px solid #dc3545;">
        <h3>Panel Bahaya (Reset)</h3>
        <p>Gunakan tombol ini untuk mengosongkan suara dan mengaktifkan kembali semua token.</p>
        <input type="password" id="adminPass" placeholder="Masukkan Password Admin">
        <button onclick="resetData()">Reset Seluruh Data</button>
    </div>

    <script>
        let myChart;

        async function updateChart() {
            const res = await fetch('/api/results');
            const data = await res.json();
            
            const labels = data.map(d => d.nama);
            const values = data.map(d => d.suara);

            if (myChart) {
                myChart.data.labels = labels;
                myChart.data.datasets[0].data = values;
                myChart.update();
            } else {
                const ctx = document.getElementById('voteChart').getContext('2d');
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Jumlah Suara',
                            data: values,
                            backgroundColor: ['#007bff', '#28a745']
                        }]
                    },
                    options: { scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
                });
            }
        }

        async function resetData() {
            const pass = document.getElementById('adminPass').value;
            if (!confirm("Apakah yakin ingin menghapus semua hasil suara?")) return;

            const res = await fetch(`/api/admin/reset?password=${pass}`, { method: 'POST' });
            const result = await res.json();
            
            if (res.ok) {
                alert(result.message);
                updateChart();
            } else {
                alert("Gagal: " + result.detail);
            }
        }

        // Update grafik otomatis setiap 5 detik
        setInterval(updateChart, 5000);
        updateChart();
    </script>
</body>
</html>
